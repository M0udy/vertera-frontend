<style>

  button{font-family:inherit}
  input,select{font-family:inherit}
  ::selection{background:#9C7A47;color:#fff}
  a{text-decoration:none;color:inherit}
  @keyframes vtCloudA{from{transform:translateX(-6%)}to{transform:translateX(6%)}}
  @keyframes vtPageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .vt-page{animation:vtPageIn .5s cubic-bezier(.22,.61,.36,1)}
  [data-reveal]{opacity:0;transform:translateY(22px);transition:opacity .9s cubic-bezier(.22,.61,.36,1),transform .9s cubic-bezier(.22,.61,.36,1)}
  [data-reveal].in{opacity:1;transform:none}
  .svc-row{position:relative;overflow:hidden;border-top:1px solid rgba(255,255,255,0.16);cursor:pointer}
  .svc-bg{position:absolute;inset:0;z-index:0;opacity:0;transform:scale(1.06);transition:opacity .6s cubic-bezier(.22,.61,.36,1),transform 1.1s cubic-bezier(.22,.61,.36,1)}
  .svc-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .svc-scrim{position:absolute;inset:0;z-index:1;opacity:0;transition:opacity .6s ease;background:linear-gradient(90deg,rgba(22,19,31,0.86) 0%,rgba(22,19,31,0.58) 46%,rgba(22,19,31,0.32) 100%)}
  .svc-arrow{opacity:0;transform:translateX(-14px);transition:opacity .5s ease,transform .5s cubic-bezier(.22,.61,.36,1)}
  .svc-word{transition:transform .5s cubic-bezier(.22,.61,.36,1)}
  .svc-row:hover .svc-bg{opacity:1;transform:scale(1)}
  .svc-row:hover .svc-scrim{opacity:1}
  .svc-row:hover .svc-arrow{opacity:1;transform:translateX(0)}
  .svc-row:hover .svc-word{transform:translateX(-10px)}
  @media (hover:none){.svc-bg,.svc-scrim{opacity:1!important;transform:none!important}.svc-arrow{opacity:1!important;transform:none!important}}
  .leaflet-div-icon{background:transparent;border:0}
  .vt-pin{transform:translate(-50%,-50%);display:flex;align-items:center;gap:6px;background:#fff;padding:4px 10px 4px 7px;border-radius:100px;box-shadow:0 3px 9px rgba(0,0,0,0.18);white-space:nowrap;font-family:'Schibsted Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer}
  .vt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .leaflet-popup-content-wrapper{border-radius:14px;padding:0;overflow:hidden;box-shadow:0 14px 44px rgba(0,0,0,0.24)}
  .leaflet-popup-content{margin:0;width:264px!important;font-family:'Hanken Grotesk',sans-serif}
  .vt-range{-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;background:#e3ddd0;outline:none}
  .vt-range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#16131F;cursor:pointer}
  .vt-range::-moz-range-thumb{width:18px;height:18px;border:0;border-radius:50%;background:#16131F;cursor:pointer}
  .vt-sel{height:40px;border:1px solid #e2dccb;border-radius:10px;background:#fff;padding:0 12px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#16131F;cursor:pointer;outline:none}
  .r-burger{display:none}
  .r-mobile-menu{display:none}
  .r-mobile-menu.open{display:flex}
  .r-browse-toggle{display:none}
  @media (max-width:860px){
    .r-navlinks{display:none!important}
    .r-burger{display:inline-flex!important}
    .r-navrow{padding:0 18px!important;height:64px!important}
    .r-stack{grid-template-columns:1fr!important}
    .r-svc-inner{display:flex!important;flex-direction:column;align-items:flex-start;gap:8px;padding:24px 0!important}
    .r-svc-num,.r-svc-arrow{display:none!important}
    .r-svc-word{order:1;text-align:left!important;font-size:clamp(46px,16vw,96px)!important;max-width:none!important}
    .r-svc-body{order:2;max-width:none!important}
    .r-sellers-hero{min-height:auto!important}
    .r-sellers-img{min-height:230px!important;order:-1}
    .r-signin-left{display:none!important}
    .r-browse-body{flex-direction:column!important}
    .r-browse-aside{width:100%!important;border-right:0!important;max-height:none}
    .r-browse-toggle{display:flex!important}
    .r-browse-body.mv-list .r-browse-map{display:none!important}
    .r-browse-body.mv-map .r-browse-aside{display:none!important}
    .r-browse-body.mv-list .r-browse-aside{flex:1;max-height:none}
    .r-howstep{grid-template-columns:52px 1fr!important;gap:14px!important}
    .r-grid3,.r-grid4,.r-grid2{grid-template-columns:1fr!important}
    .r-admin{grid-template-columns:1fr!important}
    .r-admin-aside{position:static!important;height:auto!important}
    .r-settings{grid-template-columns:1fr!important}
  }
</style>

function meta(kind){
  if(kind==='verified') return {bg:'#DCFCE7',text:'#15803D',icon:'\u2713',label:'Verified',pin:'#16A34A'};
  if(kind==='review')   return {bg:'#FEF3C7',text:'#B45309',icon:'\u26A0',label:'Caution',pin:'#D97706'};
  return {bg:'#FEE2E2',text:'#B91C1C',icon:'\u2715',label:'Flagged',pin:'#DC2626'};
}
function scoreColor(s){ return s<30?'#16A34A':(s<60?'#D97706':'#DC2626'); }
function decorate(p){ var m=meta(p.kind); return Object.assign({},p,{badgeBg:m.bg,badgeText:m.text,badgeIcon:m.icon,badgeLabel:m.label,pin:m.pin,scoreColor:scoreColor(p.score)}); }

function filteredProps(){
  var f=state.filters;
  return propsData().map(decorate).filter(function(p){
    var q=(f.q||'').trim().toLowerCase();
    if(q && !((p.title||'').toLowerCase().indexOf(q)>-1 || (p.area||'').toLowerCase().indexOf(q)>-1)) return false;
    if(f.type!=='all' && p.typeKey!==f.type) return false;
    if(p.priceVal > Number(f.priceMax)) return false;
    if(p.score > Number(f.scoreMax)) return false;
    return true;
  });
}

    mk('NSDI Cadastre',cadText,cadVal,'Boundaries cross-checked against the official national cadastre.'),
  ];
  var riskLabel=sel.kind==='verified'?'Low risk \u00B7 Verified':(sel.kind==='review'?'Caution \u00B7 Review advised':'High risk \u00B7 Flagged');
  return {sel:sel,typeLabel:typeLabels[sel.typeKey]||'Property',seller:SELLERS[sel.id]||SELLERS.pk,layers:layers,riskLabel:riskLabel};

  return '<div class="r-admin" style="display:grid;grid-template-columns:248px 1fr;min-height:100vh;background:#FAF7F1;color:#16131F"><aside class="r-admin-aside" style="background:#16131F;color:#fff;display:flex;flex-direction:column;padding:26px 18px;position:sticky;top:0;height:100vh"><div style="display:flex;align-items:center;gap:9px;padding:0 8px 28px"><img src="logo-white.png" width="30" height="30" alt="Vertera"><span style="font-family:'+SG+';font-size:19px;font-weight:700;letter-spacing:-0.02em;color:#fff">Vertera</span><span style="margin-left:auto;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#d8c6a8;background:rgba(216,198,168,0.14);padding:3px 8px;border-radius:100px">Admin</span></div><div style="font-size:11px;color:#6b6675;text-transform:uppercase;letter-spacing:0.08em;padding:0 8px 10px">Manage</div><div style="display:flex;flex-direction:column;gap:3px">'+navItem('users','Users',usersIcon)+navItem('payments','Payments',cardIcon)+'</div><div style="margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1)"><div data-act="go:home" style="display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,0.6);padding:11px 12px;border-radius:10px;cursor:pointer"><span style="font-size:16px">\u2190</span>Back to site</div><div style="display:flex;align-items:center;gap:11px;padding:12px;margin-top:4px"><div style="width:36px;height:36px;border-radius:50%;background:#534AB7;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0">AM</div><div style="min-width:0"><div style="font-size:13.5px;font-weight:500;color:#fff">Admin Mwale</div><div style="font-size:12px;color:#6b6675;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">admin@vertera.app</div></div></div></div></aside>'
  +'<div style="display:flex;flex-direction:column;min-width:0"><div style="background:#fff;border-bottom:1px solid #ece5d7;padding:22px 36px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap"><div><h1 style="font-family:'+SG+';font-size:26px;font-weight:700;letter-spacing:-0.02em;color:#16131F">'+(isUsers?'Users':'Payments')+'</h1><p style="font-size:13.5px;color:#8b857a;margin-top:3px">'+(isUsers?'Manage accounts, roles and subscriptions.':'Revenue, transactions and seller payouts.')+'</p></div><div style="display:flex;align-items:center;gap:10px"><div style="height:42px;display:flex;align-items:center;padding:0 16px;border:1px solid #e2dccb;border-radius:100px;font-size:14px;color:#6f6a60;background:#fff">Last 30 days</div><button style="height:42px;padding:0 20px;border:none;background:#16131F;color:#fff;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer">'+(isUsers?'Invite user':'Export CSV')+'</button></div></div><div style="padding:32px 36px">'+content+'</div></div></div>';
}

/* ============================ ROUTER ============================ */
var VIEWS={home:viewHome,browse:viewBrowse,how:viewHow,pricing:viewPricing,sellers:viewSellers,about:viewAbout,signin:viewSignin,terms:viewTerms,privacy:viewPrivacy,listing:viewListing,checkout:viewCheckout,settings:viewSettings,admin:viewAdmin};
function render(){
  var fn=VIEWS[state.view]||viewHome;
  var chrome=state.view!=='admin';
  document.getElementById('nav').style.display=chrome?'block':'none';
  document.getElementById('footer').style.display=chrome?'block':'none';
  document.getElementById('view').innerHTML=fn();
  window.scrollTo(0,0);
  if(state.view==='home'){ setSolidNav(false); } else { setSolidNav(true); }
  if(state.view==='browse'){ initMap(); }
  observeReveals();
}
function go(view){ if(_map){try{_map.remove()}catch(e){}_map=null;_markerGroup=null;_cadastre=null;_meMarker=null;} state.menuOpen=false; state.view=view; if(view==='signin'){state.authStep='phone';} renderNav(); render(); }
function openListing(id){ if(_map){try{_map.remove()}catch(e){}_map=null;} state.selectedId=id; state.menuOpen=false; state.view='listing'; render(); }
function openCheckout(key){ if(_map){try{_map.remove()}catch(e){}_map=null;} state.checkout={plan:checkoutPlans[key]||checkoutPlans.report,method:'card',done:false}; state.menuOpen=false; state.view='checkout'; render(); }

function observeReveals(){
  if(_io) _io.disconnect();
  var els=[].slice.call(document.querySelectorAll('[data-reveal]'));
  function reveal(el){el.classList.add('in');el.style.opacity='1';el.style.transform='none';}
  requestAnimationFrame(function(){ els.forEach(function(el){ if(el.getBoundingClientRect().top < window.innerHeight*0.95) reveal(el); }); });
  if('IntersectionObserver' in window){
    _io=new IntersectionObserver(function(ents){ents.forEach(function(e){if(e.isIntersecting){reveal(e.target);_io.unobserve(e.target);}});},{threshold:0.08,rootMargin:'0px 0px -5% 0px'});
    els.forEach(function(el){ if(!el.classList.contains('in')) _io.observe(el); });
  } else { els.forEach(reveal); }
  setTimeout(function(){els.forEach(reveal);},1600);
}

/* ============================ MAP ============================ */
function pinHtml(p){ return '<div class="vt-pin" style="color:'+p.pin+'"><span class="vt-dot" style="background:'+p.pin+'"></span>'+p.priceShort+'</div>'; }
function popupChecks(p){
  var g='#16A34A',a='#D97706',r='#DC2626';
  if(p.kind==='flagged') return [['\u2715',r,'Deed '+p.deedNo+' \u00B7 format invalid'],['\u2715',r,'Owner identity could not be matched'],['\u2715',r,'Price well below market \u00B7 high risk']];
  if(p.kind==='review') return [['\u2713',g,'Deed '+p.deedNo+' \u00B7 valid format'],['\u26A0',a,'Boundary pegs need re-verification'],['\u26A0',a,'Within market range \u00B7 minor flags']];
  return [['\u2713',g,'Deed '+p.deedNo+' \u00B7 valid \u00B7 '+p.ocr+'% OCR'],['\u2713',g,'Owner identity matched \u00B7 '+p.face+'% face'],['\u2713',g,'Satellite confirms building \u00B7 '+p.sat+'%']];
}
function popupHtml(p){
  var ch=popupChecks(p).map(function(c){return '<div style="display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.35"><span style="color:'+c[1]+';flex-shrink:0">'+c[0]+'</span><span style="color:#5a5562">'+c[2]+'</span></div>';}).join('');
  return '<div style="font-family:\'Hanken Grotesk\',sans-serif"><div style="height:118px;position:relative;background:#ECE7DB"><img src="'+p.img+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"><span style="position:absolute;top:10px;left:10px;background:'+p.badgeBg+';color:'+p.badgeText+';font-size:11px;font-weight:700;padding:4px 9px;border-radius:100px">'+p.badgeIcon+' '+p.badgeLabel+'</span></div><div style="padding:13px 14px"><div style="font-family:\'Schibsted Grotesk\',sans-serif;font-weight:700;font-size:16px;color:#16131F">'+p.title+'</div><div style="font-size:13px;color:#6f6a60;margin-top:2px">'+p.priceLabel+' \u00B7 '+p.size+'</div><div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;background:#FAF7F1;border-radius:10px;padding:9px 11px"><span style="font-size:12px;color:#6f6a60">Fraud score</span><span style="font-family:\'Schibsted Grotesk\',sans-serif;font-weight:700;font-size:18px;color:'+p.scoreColor+'">'+p.score+'<span style="font-size:11px;color:#999;font-weight:400">/100</span></span></div><div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">'+ch+'</div><button onclick="window.openListing(\''+p.id+'\')" style="margin-top:12px;width:100%;height:42px;border:none;background:#16131F;color:#fff;border-radius:100px;font-family:\'Hanken Grotesk\',sans-serif;font-size:14px;font-weight:600;cursor:pointer">View full report</button></div></div>';
}
function initMap(){
  if(!window.L){ setTimeout(initMap,120); return; }
  var el=document.getElementById('vertera-map'); if(!el||_map) return;
  _map=window.L.map(el,{zoomControl:true,scrollWheelZoom:true}).setView([-15.405,28.322],12);
  window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'\u00A9 OpenStreetMap'}).addTo(_map);
  _markerGroup=window.L.layerGroup().addTo(_map);
  refreshMarkers(); applyCadastre();
  setTimeout(function(){if(_map)_map.invalidateSize();},80);
}
function refreshMarkers(){
  if(!_map||!_markerGroup||!window.L) return;
  _markerGroup.clearLayers();
  filteredProps().forEach(function(p){
    var icon=window.L.divIcon({html:pinHtml(p),className:'',iconSize:[1,1],iconAnchor:[0,0]});
    var mk=window.L.marker([p.lat,p.lng],{icon:icon}).addTo(_markerGroup);
    mk.bindPopup(popupHtml(p),{minWidth:240,maxWidth:280});
  });
}
function applyCadastre(){
  if(!_map||!window.L) return;
  if(state.filters.cadastre && !_cadastre){
    try{ _cadastre=window.L.tileLayer.wms('https://map.gov.zm/arcgis/services/NSDI_Vector/Cadastre/MapServer/WMSServer',{layers:'0',format:'image/png',transparent:true,opacity:0.75}).addTo(_map); }catch(e){}
  } else if(!state.filters.cadastre && _cadastre){ _map.removeLayer(_cadastre); _cadastre=null; }
}
function nearMe(){
  if(!_map) return;
  var fb=function(){_map.flyTo([-15.405,28.322],12);};
  if(!navigator.geolocation){fb();return;}
  navigator.geolocation.getCurrentPosition(function(pos){var ll=[pos.coords.latitude,pos.coords.longitude];_map.flyTo(ll,14);if(_meMarker)_map.removeLayer(_meMarker);_meMarker=window.L.circleMarker(ll,{radius:8,color:'#fff',weight:3,fillColor:'#2563eb',fillOpacity:1}).addTo(_map);},fb,{timeout:6000});
}
window.openListing=openListing;

/* ============================ EVENTS ============================ */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-act]'); if(!el) return;
  var act=el.getAttribute('data-act'); var parts=act.split(':'); var cmd=parts[0], arg=parts[1];
  if(cmd==='go'){ go(arg); }
  else if(cmd==='menu'){ state.menuOpen=!state.menuOpen; renderNav(); }
  else if(cmd==='open'){ openListing(arg); }
  else if(cmd==='checkout'){ openCheckout(arg); }
  else if(cmd==='pay'){ state.checkout.done=true; render(); }
  else if(cmd==='comethod'){ state.checkout.method=arg; render(); }
  else if(cmd==='settab'){ state.setTab=arg; render(); }
  else if(cmd==='admintab'){ state.adminTab=arg; render(); }
  else if(cmd==='notiftog'){ state.notif[arg]=!state.notif[arg]; render(); }
  else if(cmd==='twofatog'){ state.twofa=!state.twofa; render(); }
  else if(cmd==='bview'){ state.browseMobileView=arg; var b=document.querySelector('.r-browse-body'); if(b){b.className='r-browse-body mv-'+arg;} document.querySelectorAll('[data-act^="bview"]').forEach(function(btn){var k=btn.getAttribute('data-act').split(':')[1];btn.style.background=k===arg?'#16131F':'transparent';btn.style.color=k===arg?'#fff':'#8b857a';}); if(_map)setTimeout(function(){_map.invalidateSize();},130); }
  else if(cmd==='nearme'){ nearMe(); }
  else if(cmd==='signin-tab'){ state.signupMode=(arg==='up'); state.authStep='phone'; render(); }
  else if(cmd==='reqotp'){
    var inp=document.getElementById('phoneLocal');
    var local=inp?inp.value.trim().replace(/\s/g,''):'';
    if(!local){alert('Please enter your phone number.');return;}
    state.authPhone='+260'+local; sessionStorage.setItem('vt_authPhone',state.authPhone);
    el.disabled=true; el.textContent='Sending…';
    fetch(API+'/auth/request-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:state.authPhone})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.error){el.disabled=false;el.textContent='Send Code';alert(d.error.message||'Failed to send code.');}
        else{state.authStep='otp';render();}
      })
      .catch(function(){el.disabled=false;el.textContent='Send Code';alert('Failed to send code. Check your number and try again.');});
  }
  else if(cmd==='verifyotp'){
    if(!state.authPhone){state.authPhone=sessionStorage.getItem('vt_authPhone')||'';}
    var boxes=document.querySelectorAll('[inputmode="numeric"]');
    var otp=Array.from(boxes).map(function(b){return b.value;}).join('');
    if(otp.length<6){alert('Please enter the full 6-digit code.');return;}
    el.disabled=true; el.textContent='Verifying…';
    fetch(API+'/auth/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:state.authPhone,otp:otp})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.token){state.token=d.token;state.user=d.user;localStorage.setItem('vt_token',d.token);go('browse');}
        else{el.disabled=false;el.textContent='Verify Code';alert((d.error&&d.error.message)||'Invalid code. Please try again.');}
      })
      .catch(function(){el.disabled=false;el.textContent='Verify Code';alert('Verification failed. Please try again.');});
  }
  else if(cmd==='sub'){
    var i=document.getElementById('subEmail');
    if(i&&/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(i.value.trim())){
      var email=i.value.trim();
      fetch(API+'/waitlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})}).catch(function(){});
      i.parentElement.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:#7CCF9A;font-size:16px"><span>✓</span><span>You’re on the list — we’ll be in touch.</span></div>';
    }
  }
});
document.addEventListener('input',function(e){
  if(e.target.id==='fQuery'){ state.filters.q=e.target.value; refreshMarkers(); document.getElementById('browseList').innerHTML=browseListHTML(); }
  else if(e.target.id==='fScore'){ state.filters.scoreMax=Number(e.target.value); var l=document.getElementById('scoreLbl'); if(l)l.textContent=e.target.value; refreshMarkers(); document.getElementById('browseList').innerHTML=browseListHTML(); }
});
document.addEventListener('change',function(e){
  if(e.target.id==='fType'){ state.filters.type=e.target.value; refreshMarkers(); document.getElementById('browseList').innerHTML=browseListHTML(); }
  else if(e.target.id==='fPrice'){ state.filters.priceMax=Number(e.target.value); refreshMarkers(); document.getElementById('browseList').innerHTML=browseListHTML(); }
  else if(e.target.id==='fCad'){ state.filters.cadastre=e.target.checked; applyCadastre(); }
});
window.addEventListener('scroll',function(){
  if(state.view!=='home') return;
  setSolidNav((window.scrollY||window.pageYOffset||0)>40);
},{passive:true});

/* ============================ BOOT ============================ */
renderNav(); renderFooter(); render();
</script>
