<style>

  a{text-decoration:none;color:inherit}
  @keyframes vtCloudA{from{transform:translateX(-6%)}to{transform:translateX(6%)}}
  @keyframes vtPageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .vt-page{animation:vtPageIn .5s cubic-bezier(.22,.61,.36,1)}
  [data-reveal]{opacity:0;transform:translateY(22px);transition:opacity .9s cubic-bezier(.22,.61,.36,1),transform .9s cubic-bezier(.22,.61,.36,1)}

  .svc-row{position:relative;overflow:hidden;border-top:1px solid rgba(255,255,255,0.16);cursor:pointer}
  .svc-bg{position:absolute;inset:0;z-index:0;opacity:0;transform:scale(1.06);transition:opacity .6s cubic-bezier(.22,.61,.36,1),transform 1.1s cubic-bezier(.22,.61,.36,1)}
  .svc-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .svc-scrim{position:absolute;inset:0;z-index:1;opacity:0;transition:opacity .6s ease;background:linear-gradient(90deg,rgba(22,19,31,0.86) 0%,rgba(22,19,31,0.58) 46%,rgba(22,19,31,0.32) 100%)}
  .svc-arrow{opacity:0;transform:translateX(-14px);transition:opacity .5s ease,transform .5s cubic-bezier(.22,.61,.36,1)}
  .svc-word{transition:transform .5s cubic-bezier(.22,.61,.36,1)}
  .svc-row:hover .svc-bg{opacity:1;transform:scale(1)}
  .svc-row:hover .svc-scrim{opacity:1}
  .svc-row:hover .svc-arrow{opacity:1;transform:translateX(0)}
  .svc-row:hover .svc-word{transform:translateX(-10px)}
  @media (hover:none){.svc-bg,.svc-scrim{opacity:1!important;transform:none!important}.svc-arrow{opacity:1!important;transform:none!important}}
  .leaflet-div-icon{background:transparent;border:0}
  .vt-pin{transform:translate(-50%,-50%);display:flex;align-items:center;gap:6px;background:#fff;padding:4px 10px 4px 7px;border-radius:100px;box-shadow:0 3px 9px rgba(0,0,0,0.18);white-space:nowrap;font-family:'Schibsted Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer}
  .vt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .leaflet-popup-content-wrapper{border-radius:14px;padding:0;overflow:hidden;box-shadow:0 14px 44px rgba(0,0,0,0.24)}
  .leaflet-popup-content{margin:0;width:264px!important;font-family:'Hanken Grotesk',sans-serif}
  .vt-range{-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;background:#e3ddd0;outline:none}
  .vt-range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#16131F;cursor:pointer}
  .vt-range::-moz-range-thumb{width:18px;height:18px;border:0;border-radius:50%;background:#16131F;cursor:pointer}
  .vt-sel{height:40px;border:1px solid #e2dccb;border-radius:10px;background:#fff;padding:0 12px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#16131F;cursor:pointer;outline:none}
  .r-burger{display:none}
  .r-mobile-menu{display:none}
  .r-mobile-menu.open{display:flex}
  .r-browse-toggle{display:none}
  @media (max-width:860px){
    .r-navlinks{display:none!important}
    .r-burger{display:inline-flex!important}
    .r-navrow{padding:0 18px!important;height:64px!important}
    .r-stack{grid-template-columns:1fr!important}
    .r-svc-inner{display:flex!important;flex-direction:column;align-items:flex-start;gap:8px;padding:24px 0!important}
    .r-svc-num,.r-svc-arrow{display:none!important}
    .r-svc-word{order:1;text-align:left!important;font-size:clamp(46px,16vw,96px)!important;max-width:none!important}
    .r-svc-body{order:2;max-width:none!important}
    .r-sellers-hero{min-height:auto!important}
    .r-sellers-img{min-height:230px!important;order:-1}
    .r-signin-left{display:none!important}
    .r-browse-body{flex-direction:column!important}
    .r-browse-aside{width:100%!important;border-right:0!important;max-height:none}
    .r-browse-toggle{display:flex!important}
    .r-browse-body.mv-list .r-browse-map{display:none!important}
    .r-browse-body.mv-map .r-browse-aside{display:none!important}
    .r-browse-body.mv-list .r-browse-aside{flex:1;max-height:none}
    .r-howstep{grid-template-columns:52px 1fr!important;gap:14px!important}

    .r-admin{grid-template-columns:1fr!important}

    .r-settings nav{position:static!important;flex-direction:row!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;gap:6px!important;padding-bottom:4px}

</style>

function meta(kind){
  if(kind==='verified') return {bg:'#DCFCE7',text:'#15803D',icon:'\u2713',label:'Verified',pin:'#16A34A'};
  if(kind==='review')   return {bg:'#FEF3C7',text:'#B45309',icon:'\u26A0',label:'Caution',pin:'#D97706'};
  return {bg:'#FEE2E2',text:'#B91C1C',icon:'\u2715',label:'Flagged',pin:'#DC2626'};
}
function scoreColor(s){ return s<30?'#16A34A':(s<60?'#D97706':'#DC2626'); }
function decorate(p){ var m=meta(p.kind); return Object.assign({},p,{badgeBg:m.bg,badgeText:m.text,badgeIcon:m.icon,badgeLabel:m.label,pin:m.pin,scoreColor:scoreColor(p.score)}); }

function mapApiListing(p){
  var kindMap={verified:'verified',caution:'review',flagged:'flagged',unverified:'unverified'};
  var kind=kindMap[p.verification_status]||'unverified';
  var priceUsd=Number(p.price_usd)||0;
  var priceLabel='K'+Math.round(priceUsd).toLocaleString();
  var priceShort=priceUsd>=1000000?'K'+(priceUsd/1000000).toFixed(2).replace(/\.?0+$/,'')+'M':'K'+(Math.round(priceUsd/1000))+'K';
  var imgs=Array.isArray(p.image_urls)&&p.image_urls.length?p.image_urls:['chev-land.png'];
  return {
    id:String(p.id),title:p.title||'Property',area:p.location||'Lusaka',
    lat:p.latitude?Number(p.latitude):(p.lat||-15.405),lng:p.longitude?Number(p.longitude):(p.lng||28.322),
    typeKey:'house',priceVal:Math.round(priceUsd/1000),
    priceLabel:priceLabel,priceShort:priceShort,
    size:p.size_acres?(p.size_acres+' acres'):'—',
    score:typeof p.fraud_score==='number'?p.fraud_score:50,
    kind:kind,
    deedNo:p.deed_number||'—',ocr:80,face:80,sat:80,
    img:imgs[0],
    is_featured:!!p.is_featured
  };
}
function filteredProps(){
  var f=state.filters;
  var base;
  if(state.listingsLoaded && state.listings.length>0){
    base=state.listings.map(mapApiListing).map(decorate);
  } else {
    base=propsData().map(decorate);
  }
  return base.filter(function(p){
    var q=(f.q||'').trim().toLowerCase();
    if(q && !((p.title||'').toLowerCase().indexOf(q)>-1 || (p.area||'').toLowerCase().indexOf(q)>-1)) return false;
    if(f.type!=='all' && p.typeKey!==f.type) return false;
    if(p.priceVal > Number(f.priceMax)) return false;
    if(p.score > Number(f.scoreMax)) return false;
    return true;
  });
}

  var aiVal=100-sel.score, aiText=sel.kind==='verified'?'Low risk':(sel.kind==='review'?'Some flags':'High risk');
  function mk(name,metric,v,desc){ var s=lstat(v); return {name:name,metric:metric,metricColor:s.c,desc:desc,statusLabel:s.l,statusColor:s.c,statusBg:s.bg,statusIcon:s.ic,barColor:s.bar,barW:Math.max(6,Math.round(v))+'%'}; }
  var layers=[
    mk('Title Deed OCR',sel.ocr+'%',sel.ocr,'Deed '+sel.deedNo+' extracted and validated against the registry format.'),

    mk('Risk Reasoning',aiText,aiVal,'Advanced reasoning weighs every signal into a single risk verdict.'),
    mk('NSDI Cadastre',cadText,cadVal,'Boundaries cross-checked against the official national cadastre.'),
  ];
  var riskLabel=sel.kind==='verified'?'Low risk \u00B7 Verified':(sel.kind==='review'?'Caution \u00B7 Review advised':'High risk \u00B7 Flagged');
  return {sel:sel,typeLabel:typeLabels[sel.typeKey]||'Property',seller:SELLERS[sel.id]||SELLERS.pk,layers:layers,riskLabel:riskLabel};
}

function fetchListings(){
  if(state.listingsLoading) return;
  state.listingsLoading=true;
  fetch(API+'/properties')
    .then(function(r){return r.json();})
    .then(function(d){
      var arr=Array.isArray(d)?d:(Array.isArray(d&&d.properties)?d.properties:[]);
      if(arr.length) state.listings=arr;
      state.listingsLoaded=true; state.listingsLoading=false;
      if(state.view==='browse') render();
    })
    .catch(function(){state.listingsLoaded=true; state.listingsLoading=false; if(state.view==='browse') render();});
}

function fetchAdminData(){
  if(state.adminData.loading||state.adminData.loaded) return;
  if(!state.token) return;
  state.adminData.loading=true;
  var h={'Authorization':'Bearer '+state.token};
  Promise.all([
    fetch(API+'/admin/stats',{headers:h}).then(function(r){return r.json();}).catch(function(){return null;}),
    fetch(API+'/admin/users?limit=50&offset=0',{headers:h}).then(function(r){return r.json();}).catch(function(){return [];}),
    fetch(API+'/admin/analytics',{headers:h}).then(function(r){return r.json();}).catch(function(){return null;})
  ]).then(function(res){
    state.adminData.stats=res[0];
    state.adminData.users=Array.isArray(res[1])?res[1]:[];
    state.adminData.analytics=res[2];
    state.adminData.loaded=true;
    state.adminData.loading=false;
    if(state.view==='admin') render();
  }).catch(function(){
    state.adminData.loading=false;
    if(state.view==='admin') render();
  });
}

function listingDataFromApi(d){
  var kindMap={verified:'verified',review:'review',flagged:'flagged',pending:'review',caution:'review'};
  var kind=kindMap[d.verification_status]||'review';
  var m=meta(kind);
  var priceUsd=Number(d.price_usd)||0;
  var priceLabel='K'+Math.round(priceUsd).toLocaleString();
  var priceShort=priceUsd>=1000000?'K'+(priceUsd/1000000).toFixed(2).replace(/\.?0+$/,'')+'M':'K'+Math.round(priceUsd/1000)+'K';
  var score=typeof d.fraud_score==='number'?Math.round(d.fraud_score):50;
  var imgs=Array.isArray(d.image_urls)&&d.image_urls.length?d.image_urls:['chev-land.png'];
  var sc=scoreColor(score);
  var baseOcr=kind==='verified'?94:(kind==='flagged'?41:80);
  var baseFace=kind==='verified'?96:(kind==='flagged'?0:78);
  var baseSat=kind==='verified'?92:(kind==='flagged'?38:72);
  var sel={
    id:String(d.id),title:d.title||'Property',area:d.location||'Lusaka',
    lat:d.latitude?Number(d.latitude):-15.405,lng:d.longitude?Number(d.longitude):28.322,
    typeKey:'house',priceVal:Math.round(priceUsd/1000),
    priceLabel:priceLabel,priceShort:priceShort,
    size:d.size_acres?(d.size_acres+' acres'):'—',
    score:score,kind:kind,deedNo:d.deed_number||'—',
    ocr:baseOcr,face:baseFace,sat:baseSat,img:imgs[0],
    badgeBg:m.bg,badgeText:m.text,badgeIcon:m.icon,badgeLabel:m.label,pin:m.pin,scoreColor:sc,
  };
  var sv=d.seller||{};
  var sName=sv.name||'Seller';
  var sInit=sName.trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase()||'?';
  var sVerified=!!(sv.badge||sv.kyc_status==='verified');
  var sMeta=sVerified?'Identity verified · seller':'Individual seller';
  function lstat(v){return v>=85?{l:'Verified',c:'#15803D',bg:'#DCFCE7',ic:'✓',bar:'#16A34A'}:(v>=55?{l:'Review',c:'#B45309',bg:'#FEF3C7',ic:'⚠',bar:'#D97706'}:{l:'Failed',c:'#B91C1C',bg:'#FEE2E2',ic:'✕',bar:'#DC2626'});}
  var rulesPct=kind==='verified'?100:(kind==='review'?83:42);
  var rulesPassed=kind==='verified'?'12 / 12 passed':(kind==='review'?'10 / 12 passed':'5 / 12 passed');
  var cadVal=kind==='verified'?100:(kind==='review'?70:20);
  var cadText=kind==='verified'?'Exact match':(kind==='review'?'Partial match':'No match');
  var aiVal=100-score,aiText=kind==='verified'?'Low risk':(kind==='review'?'Some flags':'High risk');
  function mk(name,metric,v,desc){var s=lstat(v);return {name:name,metric:metric,metricColor:s.c,desc:desc,statusLabel:s.l,statusColor:s.c,statusBg:s.bg,statusIcon:s.ic,barColor:s.bar,barW:Math.max(6,Math.round(v))+'%'};}
  var deedDesc=d.deed_number?'Deed '+d.deed_number+' extracted and validated against the registry format.':'Title deed data not yet verified.';
  var layers=[
    mk('Title Deed OCR',baseOcr+'%',baseOcr,deedDesc),
    mk('Owner Identity',baseFace+'%',baseFace,'Seller ID and face matched to the registered title holder.'),
    mk('Satellite Imagery',baseSat+'%',baseSat,'Building footprint and plot boundaries confirmed from orbit.'),
    mk('Rules Engine',rulesPassed,rulesPct,'Twelve automated fraud rules across price, ownership and documents.'),
    mk('AI Reasoning',aiText,aiVal,'Advanced reasoning weighs every signal into a single risk verdict.'),
    mk('NSDI Cadastre',cadText,cadVal,'Boundaries cross-checked against the official national cadastre.'),
  ];
  var riskLabel=kind==='verified'?'Low risk · Verified':(kind==='review'?'Caution · Review advised':'High risk · Flagged');
  return {sel:sel,typeLabel:'Property',seller:{name:sName,init:sInit,meta:sMeta,verified:sVerified},layers:layers,riskLabel:riskLabel};
}

  state.selectedId=id; state.menuOpen=false; state.view='listing';
  state.selectedDetail=null;
  var quick=state.listings.filter(function(p){return String(p.id)===String(id);})[0];
  if(quick){state.selectedDetail=quick;state.listingLoading=false;}
  else{state.listingLoading=true;}
  renderNav(); render();
  var headers=state.token?{'Authorization':'Bearer '+state.token}:{};
  fetch(API+'/properties/'+id,{headers:headers})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.id){state.selectedDetail=d;}
      state.listingLoading=false;
      if(state.view==='listing'&&state.selectedId===id) render();
    })
    .catch(function(){
      state.listingLoading=false;
      if(state.view==='listing'&&state.selectedId===id) render();
    });
}
function openCheckout(key){ if(_map){try{_map.remove()}catch(e){}_map=null;} state.checkout={plan:checkoutPlans[key]||checkoutPlans.report,method:'card',done:false}; state.menuOpen=false; state.view='checkout'; render(); }

function observeReveals(){
  if(_io) _io.disconnect();
  var els=[].slice.call(document.querySelectorAll('[data-reveal]'));
  function reveal(el){el.classList.add('in');el.style.opacity='1';el.style.transform='none';}
  requestAnimationFrame(function(){ els.forEach(function(el){ if(el.getBoundingClientRect().top < window.innerHeight*0.95) reveal(el); }); });
  if('IntersectionObserver' in window){
    _io=new IntersectionObserver(function(ents){ents.forEach(function(e){if(e.isIntersecting){reveal(e.target);_io.unobserve(e.target);}});},{threshold:0.08,rootMargin:'0px 0px -5% 0px'});
    els.forEach(function(el){ if(!el.classList.contains('in')) _io.observe(el); });
  } else { els.forEach(reveal); }
  setTimeout(function(){els.forEach(reveal);},1600);
}

/* ============================ MAP ============================ */
function pinHtml(p){ return '<div class="vt-pin" style="color:'+p.pin+'"><span class="vt-dot" style="background:'+p.pin+'"></span>'+p.priceShort+'</div>'; }
function popupChecks(p){
  var g='#16A34A',a='#D97706',r='#DC2626';
  if(p.kind==='flagged') return [['\u2715',r,'Deed '+p.deedNo+' \u00B7 format invalid'],['\u2715',r,'Owner identity could not be matched'],['\u2715',r,'Price well below market \u00B7 high risk']];
  if(p.kind==='review') return [['\u2713',g,'Deed '+p.deedNo+' \u00B7 valid format'],['\u26A0',a,'Boundary pegs need re-verification'],['\u26A0',a,'Within market range \u00B7 minor flags']];
  return [['\u2713',g,'Deed '+p.deedNo+' \u00B7 valid \u00B7 '+p.ocr+'% OCR'],['\u2713',g,'Owner identity matched \u00B7 '+p.face+'% face'],['\u2713',g,'Satellite confirms building \u00B7 '+p.sat+'%']];
}
function popupHtml(p){
  var ch=popupChecks(p).map(function(c){return '<div style="display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.35"><span style="color:'+c[1]+';flex-shrink:0">'+c[0]+'</span><span style="color:#5a5562">'+c[2]+'</span></div>';}).join('');
  return '<div style="font-family:\'Hanken Grotesk\',sans-serif"><div style="height:118px;position:relative;background:#ECE7DB"><img src="'+p.img+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"><span style="position:absolute;top:10px;left:10px;background:'+p.badgeBg+';color:'+p.badgeText+';font-size:11px;font-weight:700;padding:4px 9px;border-radius:100px">'+p.badgeIcon+' '+p.badgeLabel+'</span></div><div style="padding:13px 14px"><div style="font-family:\'Schibsted Grotesk\',sans-serif;font-weight:700;font-size:16px;color:#16131F">'+p.title+'</div><div style="font-size:13px;color:#6f6a60;margin-top:2px">'+p.priceLabel+' \u00B7 '+p.size+'</div><div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;background:#FAF7F1;border-radius:10px;padding:9px 11px"><span style="font-size:12px;color:#6f6a60">Fraud score</span><span style="font-family:\'Schibsted Grotesk\',sans-serif;font-weight:700;font-size:18px;color:'+p.scoreColor+'">'+p.score+'<span style="font-size:11px;color:#999;font-weight:400">/100</span></span></div><div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">'+ch+'</div><div style="display:flex;gap:6px;margin-top:12px"><button onclick="window.navigateProperty('+p.lat+','+p.lng+')" style="flex:1;height:38px;border:none;background:#F0EDE7;color:#16131F;border-radius:100px;font-family:\'Hanken Grotesk\',sans-serif;font-size:12px;font-weight:600;cursor:pointer">Navigate</button><button onclick="window.shareProperty(\''+p.id+'\')" style="flex:1;height:38px;border:none;background:#F0EDE7;color:#16131F;border-radius:100px;font-family:\'Hanken Grotesk\',sans-serif;font-size:12px;font-weight:600;cursor:pointer">Share</button><button onclick="window.openListing(\''+p.id+'\')" style="flex:2;height:38px;border:none;background:#16131F;color:#fff;border-radius:100px;font-family:\'Hanken Grotesk\',sans-serif;font-size:12px;font-weight:600;cursor:pointer">View report</button></div></div></div>';
}
function initMap(){
  if(!window.L){ setTimeout(initMap,120); return; }
  var el=document.getElementById('vertera-map'); if(!el||_map) return;
  _map=window.L.map(el,{zoomControl:true,scrollWheelZoom:true}).setView([-15.405,28.322],12);
  window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'\u00A9 OpenStreetMap'}).addTo(_map);
  _markerGroup=window.L.layerGroup().addTo(_map);
  refreshMarkers(); applyCadastre();
  setTimeout(function(){if(_map)_map.invalidateSize();},80);
}
function refreshMarkers(){
  if(!_map||!_markerGroup||!window.L) return;
  _markerGroup.clearLayers();
  filteredProps().forEach(function(p){
    var icon=window.L.divIcon({html:pinHtml(p),className:'',iconSize:[1,1],iconAnchor:[0,0]});
    var mk=window.L.marker([p.lat,p.lng],{icon:icon}).addTo(_markerGroup);
    mk.bindPopup(popupHtml(p),{minWidth:240,maxWidth:280});
  });
}
function applyCadastre(){
  if(!_map||!window.L) return;
  if(state.filters.cadastre && !_cadastre){
    try{ _cadastre=window.L.tileLayer.wms('https://map.gov.zm/arcgis/services/NSDI_Vector/Cadastre/MapServer/WMSServer',{layers:'0',format:'image/png',transparent:true,opacity:0.75}).addTo(_map); }catch(e){}
  } else if(!state.filters.cadastre && _cadastre){ _map.removeLayer(_cadastre); _cadastre=null; }
}
function nearMe(){
  if(!_map) return;
  var fb=function(){_map.flyTo([-15.405,28.322],12);};
  if(!navigator.geolocation){fb();return;}
  navigator.geolocation.getCurrentPosition(function(pos){var ll=[pos.coords.latitude,pos.coords.longitude];_map.flyTo(ll,14);if(_meMarker)_map.removeLayer(_meMarker);_meMarker=window.L.circleMarker(ll,{radius:8,color:'#fff',weight:3,fillColor:'#2563eb',fillOpacity:1}).addTo(_map);},fb,{timeout:6000});
}
window.openListing=openListing;
window.shareProperty=function(id){
  var url=window.location.origin+'/?listing='+id;
  if(navigator.share){navigator.share({title:'Property on Vertera',url:url}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){alert('Link copied!');}).catch(function(){prompt('Copy link:',url);});}
  else{prompt('Copy link:',url);}
};
window.navigateProperty=function(lat,lng){
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  window.open(isIOS?'maps://maps.apple.com/?q='+lat+','+lng:'https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng,'_blank');
};

/* ============================ EVENTS ============================ */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-act]'); if(!el) return;
  var act=el.getAttribute('data-act'); var parts=act.split(':'); var cmd=parts[0], arg=parts[1];
  if(cmd==='go'){ go(arg); }
  else if(cmd==='menu'){ state.menuOpen=!state.menuOpen; renderNav(); }
  else if(cmd==='open'){ openListing(arg); }
  else if(cmd==='checkout'){ openCheckout(arg); }
  else if(cmd==='pay'){
    if(!state.token){alert('Please sign in first.');return;}
    var p=state.checkout.plan||checkoutPlans.report;
    var m=state.checkout.method;
    // Card / bank / Zamtel: not yet live via API — show placeholder success
    if(m==='card'||m==='bank'||m==='zamtel'){state.checkout.done=true;render();return;}
    // Boost plans not yet in PawaPay catalogue
    if(p.kind==='boost'){alert('Listing boosts via mobile money are coming soon. Please use card or bank transfer for now.');return;}
    // MTN / Airtel → PawaPay push
    var phoneEl=document.getElementById('mmPhone');
    var rawPhone=(phoneEl&&phoneEl.value.trim())||'';
    if(!rawPhone){alert('Please enter your '+(m==='mtn'?'MTN':'Airtel')+' number.');return;}
    var phone=rawPhone.replace(/\s+/g,'').replace(/^\+/,'');
    if(/^0/.test(phone)) phone='260'+phone.slice(1); else if(!/^260/.test(phone)) phone='260'+phone;
    if(!/^260\d{9}$/.test(phone)){alert('Please enter a valid Zambian number — e.g. 97 000 0000.');return;}
    var correspondent=m==='mtn'?'MTN_MOMO_ZMB':'AIRTEL_OAPI_ZMB';
    var purpose='buyer';
    if(p.kind==='report') purpose='report';
    else if(p.name&&p.name.indexOf('Seller')!==-1) purpose='seller';
    else if(p.name&&p.name.indexOf('Bank')!==-1) purpose='bank';
    var body={phone:phone,correspondent:correspondent,purpose:purpose};
    if(purpose==='report'&&state.selectedId) body.property_id=state.selectedId;
    el.disabled=true; el.textContent='Sending prompt…';
    fetch(API+'/payments/deposit',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},
      body:JSON.stringify(body)
    })
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.depositId||d.paymentId){
        state.checkout.momoPhone=phone;
        state.checkout.momoRef=d.depositId||d.paymentId;
        state.checkout.momoCorrespondent=correspondent;
        state.checkout.done=true;
        render();
      } else {
        el.disabled=false; el.textContent='Pay '+p.price;
        alert((d.error&&d.error.message)||'Could not initiate payment. Please try again.');
      }
    })
    .catch(function(){el.disabled=false; el.textContent='Pay '+(p&&p.price||''); alert('Connection error. Please try again.');});
  }
  else if(cmd==='comethod'){ state.checkout.method=arg; render(); }
  else if(cmd==='settab'){ state.setTab=arg; render(); }
  else if(cmd==='admintab'){ state.adminTab=arg; fetchAdminData(); render(); }
  else if(cmd==='notiftog'){ state.notif[arg]=!state.notif[arg]; render(); if(state.token){fetch(API+'/auth/me/notifications',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},body:JSON.stringify(state.notif)}).catch(function(){});} }
  else if(cmd==='twofatog'){ state.twofa=!state.twofa; render(); }
  else if(cmd==='bview'){ state.browseMobileView=arg; var b=document.querySelector('.r-browse-body'); if(b){b.className='r-browse-body mv-'+arg;} document.querySelectorAll('[data-act^="bview"]').forEach(function(btn){var k=btn.getAttribute('data-act').split(':')[1];btn.style.background=k===arg?'#16131F':'transparent';btn.style.color=k===arg?'#fff':'#8b857a';}); if(_map)setTimeout(function(){_map.invalidateSize();},130); }
  else if(cmd==='nearme'){ nearMe(); }
  else if(cmd==='signin-tab'){ state.signupMode=(arg==='up'); state.authStep='phone'; render(); }
  else if(cmd==='reqotp'){
    var inp=document.getElementById('phoneLocal');
    var local=inp?inp.value.trim().replace(/\s/g,''):'';
    if(!local){alert('Please enter your phone number.');return;}
    state.authPhone='+260'+local; sessionStorage.setItem('vt_authPhone',state.authPhone);
    el.disabled=true; el.textContent='Sending…';
    fetch(API+'/auth/request-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:state.authPhone})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.error){el.disabled=false;el.textContent='Send Code';alert(d.error.message||'Failed to send code.');}
        else{state.authStep='otp';render();}
      })
      .catch(function(){el.disabled=false;el.textContent='Send Code';alert('Failed to send code. Check your number and try again.');});
  }
  else if(cmd==='verifyotp'){
    if(!state.authPhone){state.authPhone=sessionStorage.getItem('vt_authPhone')||'';}
    var otpEl=document.getElementById('otpSingle');
    var otp=otpEl?otpEl.value.replace(/\D/g,'').slice(0,6):'';
    if(otp.length<6){alert('Please enter the full 6-digit code.');return;}
    el.disabled=true; el.textContent='Verifying…';
    fetch(API+'/auth/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:state.authPhone,otp:otp})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.token){state.token=d.token;state.user=d.user;localStorage.setItem('vt_token',d.token);go('browse');}
        else{el.disabled=false;el.textContent='Verify Code';alert((d.error&&d.error.message)||'Invalid code. Please try again.');}
      })
      .catch(function(){el.disabled=false;el.textContent='Verify Code';alert('Verification failed. Please try again.');});
  }
  else if(cmd==='signout'){
    state.token=null; state.user=null; localStorage.removeItem('vt_token'); sessionStorage.removeItem('vt_authPhone');
    go('home'); renderNav();
  }
  else if(cmd==='deleteaccount'){
    if(!state.token) return;
    if(!confirm('Are you sure? This permanently deletes your account and cannot be undone.')) return;
    fetch(API+'/auth/me',{method:'DELETE',headers:{'Authorization':'Bearer '+state.token}})
      .then(function(){state.token=null;state.user=null;localStorage.removeItem('vt_token');sessionStorage.removeItem('vt_authPhone');go('home');renderNav();})
      .catch(function(){alert('Could not delete account. Please contact hello@vertera.app.');});
  }
  else if(cmd==='saveprofile'){
    var nameEl=document.getElementById('profName'); var emailEl=document.getElementById('profEmail');
    var nm=nameEl?nameEl.value.trim():''; var em=emailEl?emailEl.value.trim():'';
    if(!state.token){return;}
    el.disabled=true; el.textContent='Saving…';
    fetch(API+'/auth/me',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},body:JSON.stringify({name:nm||null,email:em||null})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.id){state.user=d;renderNav();el.textContent='Saved!';}
        else{el.textContent='Save changes';alert((d.error&&d.error.message)||'Failed to save.');}
        el.disabled=false;
      })
      .catch(function(){el.disabled=false;el.textContent='Save changes';alert('Failed to save. Try again.');});
  }
  else if(cmd==='contactseller'){
    if(!state.token){go('signin');return;}
    var lid=state.currentListing||state.selectedId;
    if(!lid){return;}
    el.disabled=true; el.textContent='Sending…';
    fetch(API+'/properties/'+lid+'/message-seller',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},body:JSON.stringify({content:'Hi, I am interested in this property. Please get in touch.'})})
      .then(function(r){return r.json();})
      .then(function(d){
        el.disabled=false; el.textContent='Message sent ✓';
        if(d.error){el.textContent='Contact seller';alert((d.error&&d.error.message)||'Could not send message.');}
      })
      .catch(function(){el.disabled=false; el.textContent='Contact seller'; alert('Could not send message. Try again.');});
  }
  else if(cmd==='submitproperty'){
    if(!state.token){alert('Please sign in first.');return;}
    var title=document.getElementById('cpTitle');
    var loc=document.getElementById('cpLocation');
    var price=document.getElementById('cpPrice');
    var size=document.getElementById('cpSize');
    var deed=document.getElementById('cpDeed');
    var desc=document.getElementById('cpDesc');
    if(!title||!title.value.trim()){alert('Please enter a title.');return;}
    if(!loc||!loc.value.trim()){alert('Please enter a location.');return;}
    if(!price||!price.value){alert('Please enter a price.');return;}
    el.disabled=true; el.textContent='Submitting…';
    var body={title:title.value.trim(),location:loc.value.trim(),price_usd:Number(price.value)};
    if(size&&size.value) body.size_acres=Number(size.value);
    if(deed&&deed.value.trim()) body.deed_number=deed.value.trim();
    if(desc&&desc.value.trim()) body.description=desc.value.trim();
    fetch(API+'/properties',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.token},body:JSON.stringify(body)})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.id){
          state.currentListing=d.id;
          var photoInput=document.getElementById('cpPhotos');
          var photos=photoInput&&photoInput.files&&photoInput.files.length?photoInput.files:null;
          function finish(withPhotos){
            fetchListings();
            go('browse');
            setTimeout(function(){alert(withPhotos?'Listing submitted with photos! It is now live on the marketplace.':'Listing submitted! It is now live on the marketplace.');},300);
          }
          if(photos&&photos.length>0){
            el.textContent='Uploading photos…';
            var uploads=[];
            for(var pi=0;pi<Math.min(photos.length,8);pi++){
              var fd=new FormData();
              fd.append('file',photos[pi]);
              uploads.push(fetch(API+'/properties/'+d.id+'/upload',{method:'POST',headers:{'Authorization':'Bearer '+state.token},body:fd}));
            }
            Promise.all(uploads).then(function(){finish(true);}).catch(function(){finish(false);});
          } else {
            finish(false);
          }
        } else {
          el.disabled=false; el.textContent='Submit listing';
          alert((d.error&&d.error.message)||'Failed to submit. Please try again.');
        }
      })
      .catch(function(){el.disabled=false; el.textContent='Submit listing'; alert('Failed to submit. Check your connection.');});
  }
  else if(cmd==='sub'){
    var i=document.getElementById('subEmail');
    if(i&&/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(i.value.trim())){
      var email=i.value.trim();
      fetch(API+'/waitlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})}).catch(function(){});
      i.parentElement.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:#7CCF9A;font-size:16px"><span>✓</span><span>You’re on the list — we’ll be in touch.</span></div>';
    }
  }
});
document.addEventListener('input',function(e){
  if(e.target.id==='fQuery'){ state.filters.q=e.target.value; refreshMarkers(); document.getElementById('browseList').innerHTML=browseListHTML(); }
  else if(e.target.id==='fScore'){ state.filters.scoreMax=Number(e.target.value); var l=document.getElementById('scoreLbl'); if(l)l.textContent=e.target.value; refreshMarkers(); document.getElementById('browseList').innerHTML=browseListHTML(); }
});
document.addEventListener('change',function(e){
  if(e.target.id==='fType'){ state.filters.type=e.target.value; refreshMarkers(); document.getElementById('browseList').innerHTML=browseListHTML(); }
  else if(e.target.id==='fPrice'){ state.filters.priceMax=Number(e.target.value); refreshMarkers(); document.getElementById('browseList').innerHTML=browseListHTML(); }
  else if(e.target.id==='fCad'){ state.filters.cadastre=e.target.checked; applyCadastre(); }
  else if(e.target.id==='cpPhotos'){
    var prev=document.getElementById('cpPhotoPreview');
    if(!prev) return;
    prev.innerHTML='';
    var files=e.target.files;
    var zone=document.getElementById('cpPhotoZone');
    if(!files||!files.length){ if(zone) zone.querySelector('p').textContent='Click to add photos'; return; }
    if(zone) zone.querySelector('p').textContent=files.length+' photo'+(files.length>1?'s':'')+' selected — click to change';
    for(var pi=0;pi<Math.min(files.length,8);pi++){
      (function(f){
        var r=new FileReader();
        r.onload=function(ev){
          var thumb=document.createElement('div');
          thumb.style='width:80px;height:80px;border-radius:8px;overflow:hidden;flex-shrink:0;border:1px solid #e2dccb';
          thumb.innerHTML='<img src="'+ev.target.result+'" style="width:100%;height:100%;object-fit:cover">';
          prev.appendChild(thumb);
        };
        r.readAsDataURL(f);
      })(files[pi]);
    }
  }
});
window.addEventListener('scroll',function(){
  if(state.view!=='home') return;
  setSolidNav((window.scrollY||window.pageYOffset||0)>40);
},{passive:true});

/* ============================ BOOT ============================ */
renderNav(); renderFooter(); render();
fetchListings();
if(state.token){
  fetch(API+'/auth/me',{headers:{'Authorization':'Bearer '+state.token}})
    .then(function(r){return r.ok?r.json():Promise.reject(r.status);})
    .then(function(u){state.user=u;renderNav();if(u.notification_preferences&&Object.keys(u.notification_preferences).length>0){state.notif=Object.assign({},state.notif,u.notification_preferences);}})
    .catch(function(s){if(s===401){state.token=null;state.user=null;localStorage.removeItem('vt_token');renderNav();}});
}
